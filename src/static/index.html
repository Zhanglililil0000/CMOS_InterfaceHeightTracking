<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMOS 高度控制系统</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
  background: #1a1a2e; color: #e0e0e0;
  display: flex; height: 100vh; overflow: hidden;
}

.left-panel {
  flex: 1; display: flex; align-items: center; justify-content: center;
  background: #0f0f1a; padding: 10px; position: relative;
}
.left-panel img {
  max-width: 100%; max-height: 100%; object-fit: contain;
  border: 2px solid #2a2a4a; border-radius: 6px;
}
.no-signal {
  position: absolute; color: #555; font-size: 20px;
  pointer-events: none;
}

.right-panel {
  width: 360px; min-width: 360px; display: flex; flex-direction: column;
  padding: 12px; gap: 10px; overflow-y: auto; overflow-x: hidden;
  background: #16213e; border-left: 1px solid #2a2a4a;
}

.card {
  background: #1a1a3e; border: 1px solid #2a2a5a;
  border-radius: 8px; padding: 12px;
}

.card h3 {
  font-size: 14px; color: #7eb8ff; margin-bottom: 10px;
  text-transform: uppercase; letter-spacing: 1px;
  border-bottom: 1px solid #2a2a5a; padding-bottom: 6px; flex-shrink: 0;
}

.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
.btn {
  padding: 8px 16px; border: none; border-radius: 6px;
  font-size: 14px; cursor: pointer; transition: all 0.2s;
  color: #fff; font-weight: 500;
}
.btn:hover { filter: brightness(1.2); }
.btn:active { transform: scale(0.97); }
.btn-blue { background: #2563eb; }
.btn-green { background: #16a34a; }
.btn-red { background: #dc2626; }
.btn-gray { background: #4a4a6a; }
.btn-amber { background: #d97706; }
.btn-sm { padding: 6px 12px; font-size: 12px; }

.input-group {
  display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
}
.input-group label { font-size: 13px; color: #aaa; min-width: 52px; flex-shrink: 0; white-space: nowrap; }
.input-group input {
  flex: 1; padding: 6px 10px; border: 1px solid #3a3a6a;
  border-radius: 4px; background: #0f0f2a; color: #e0e0e0;
  font-size: 13px; outline: none;
}
.input-group input:focus { border-color: #2563eb; }

.status-row {
  display: flex; justify-content: space-between;
  align-items: center; padding: 4px 0;
}
.status-label { font-size: 12px; color: #888; }
.status-value {
  font-size: 14px; font-weight: 600;
  font-family: 'Consolas', 'Courier New', monospace;
}
.status-value.on { color: #22c55e; }
.status-value.off { color: #ef4444; }
.status-value.info { color: #7eb8ff; }

.spot-indicator {
  display: flex; align-items: center; justify-content: center;
  gap: 20px; margin: 4px 0;
}
.spot-item { text-align: center; }
.spot-item .val {
  font-size: 22px; font-weight: 700; font-family: 'Consolas', monospace;
  color: #f59e0b;
}
.spot-item .lbl { font-size: 11px; color: #888; margin-top: 2px; }

.error-bar {
  height: 6px; background: #2a2a4a; border-radius: 3px;
  margin: 4px 0; overflow: hidden;
}
.error-fill {
  height: 100%; transition: width 0.3s;
  background: linear-gradient(90deg, #22c55e, #f59e0b, #ef4444);
}

.conn-section {
  display: flex; gap: 8px; align-items: center;
}
.conn-dot {
  width: 10px; height: 10px; border-radius: 50%;
  display: inline-block; margin-right: 4px;
}
.conn-dot.online { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
.conn-dot.offline { background: #ef4444; }

#logArea {
  max-height: 80px; overflow-y: auto;
  font-size: 11px; color: #888; font-family: 'Consolas', monospace;
  line-height: 1.4;
}
</style>
</head>
<body>

<div class="left-panel">
  <img id="cameraImage" src="" alt="等待相机图像..." style="display:none;">
  <span class="no-signal" id="noSignal">等待相机连接...</span>
</div>

<div class="right-panel">

  <div class="card">
    <h3>连接状态</h3>
    <div class="conn-section">
      <button class="btn btn-blue btn-sm" onclick="enumCameras()">枚举相机</button>
      <select id="cameraSelect" style="padding:4px 6px;background:#0f0f2a;border:1px solid #3a3a6a;color:#e0e0e0;border-radius:4px;font-size:12px;flex:1;min-width:0;">
        <option value="">-- 选择相机 --</option>
      </select>
      <button class="btn btn-green btn-sm" onclick="openCamera()">打开相机</button>
      <button class="btn btn-red btn-sm" onclick="closeCamera()">关闭</button>
    </div>
    <div class="conn-section" style="margin-top:8px;">
      <label style="font-size:12px;color:#aaa;">COM:</label>
      <input id="comPort" value="COM5" style="width:70px;padding:4px 6px;background:#0f0f2a;border:1px solid #3a3a6a;color:#e0e0e0;border-radius:4px;font-size:12px;">
      <button class="btn btn-green btn-sm" onclick="connectStage()">连接位移台</button>
      <button class="btn btn-gray btn-sm" onclick="disconnectStage()">断开</button>
    </div>
    <div class="status-row">
      <span class="status-label">相机: <span class="conn-dot offline" id="camDot"></span><span id="camStatus">未连接</span></span>
      <span class="status-label">位移台: <span class="conn-dot offline" id="stageDot"></span><span id="stageStatus">未连接</span></span>
    </div>
  </div>

  <div class="card">
    <h3>相机灵敏度</h3>
    <div class="input-group">
      <label>曝光(μs)</label>
      <input id="exposureVal" type="number" value="10000" step="100" min="1">
      <button class="btn btn-blue btn-sm" onclick="setExposure()" style="flex-shrink:0;">设置</button>
    </div>
    <div class="input-group">
      <label>增益(dB)</label>
      <input id="gainVal" type="number" value="0" step="0.1" min="0">
      <button class="btn btn-blue btn-sm" onclick="setGain()" style="flex-shrink:0;">设置</button>
    </div>
    <div class="status-row">
      <span class="status-label">当前曝光</span>
      <span class="status-value info" id="curExposure">--</span>
    </div>
    <div class="status-row">
      <span class="status-label">当前增益</span>
      <span class="status-value info" id="curGain">--</span>
    </div>
  </div>

  <div class="card">
    <h3>位移台控制</h3>
    <div class="btn-row" style="margin-bottom:8px; justify-content:center;">
      <button class="btn btn-amber btn-sm" onclick="homeStage()">搜零</button>
    </div>
    <div class="input-group" style="margin-top:10px;">
      <label>步进距离</label>
      <input id="stepDistance" type="number" value="10" step="0.1">
    </div>
    <div class="btn-row">
      <button class="btn btn-blue btn-sm" onclick="moveRel(1)">▲ 步进+</button>
      <button class="btn btn-blue btn-sm" onclick="moveRel(-1)">▼ 步进-</button>
      <button class="btn btn-red btn-sm" onclick="stopStage()">停止</button>
    </div>
  </div>

  <div class="card">
    <h3>稳高控制</h3>
    <div class="input-group">
      <label>目标X</label>
      <input id="targetX" type="number" value="" step="0.1" placeholder="标定后自动填入">
    </div>
    <div class="input-group">
      <label>死区</label>
      <input id="deadZone" type="number" value="2.0" step="0.1" min="0">
    </div>
    <div class="input-group">
      <label>Kp</label>
      <input id="kpVal" type="number" value="0.3" step="0.1" min="0">
    </div>
    <div class="input-group">
      <label>平滑窗口</label>
      <input id="windowVal" type="number" value="10" step="1" min="1" max="100">
    </div>
    <div class="btn-row">
      <button class="btn btn-amber btn-sm" onclick="calibrate()">标定当前位置</button>
      <button class="btn btn-green btn-sm" id="btnStartStab" onclick="startStabilize()">开始稳高</button>
      <button class="btn btn-red btn-sm" id="btnStopStab" onclick="stopStabilize()">停止稳高</button>
    </div>
    <div id="stabStatus" style="font-size:12px;color:#888;margin-top:6px;">稳高: 未启动</div>
  </div>

  <div class="card">
    <h3>实时数据</h3>
    <div class="spot-indicator">
      <div class="spot-item">
        <div class="val" id="spotX">--</div>
        <div class="lbl">光斑X (高度)</div>
      </div>
      <div class="spot-item">
        <div class="val" id="smoothX">--</div>
        <div class="lbl">平滑X</div>
      </div>
      <div class="spot-item">
        <div class="val" id="spotY">--</div>
        <div class="lbl">光斑Y (像素)</div>
      </div>
    </div>
    <div class="status-row">
      <span class="status-label">误差</span>
      <span class="status-value" id="errorVal" style="color:#f59e0b;">--</span>
    </div>
    <div class="error-bar">
      <div class="error-fill" id="errorBar" style="width:0%;"></div>
    </div>
    <div class="status-row">
      <span class="status-label">帧率</span>
      <span class="status-value info" id="fpsVal">--</span>
    </div>
    <div class="status-row">
      <span class="status-label">位移台位置</span>
      <span class="status-value info" id="stagePos">--</span>
    </div>
  </div>

  <div class="card">
    <h3>日志</h3>
    <div id="logArea"></div>
  </div>

</div>

<script>
let ws = null;
let lastFrameTime = 0;
let frameCount = 0;
let fps = 0;
let isStabilizing = false;
let isCameraConnected = false;
let isStageConnected = false;

function connectWS() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = `${protocol}//${location.host}/ws`;
  ws = new WebSocket(wsUrl);

  ws.onopen = () => log('WebSocket 已连接');
  ws.onmessage = (evt) => {
    const data = JSON.parse(evt.data);
    if (data.type === 'frame') {
      document.getElementById('cameraImage').src = 'data:image/jpeg;base64,' + data.image;
      document.getElementById('cameraImage').style.display = 'block';
      document.getElementById('noSignal').style.display = 'none';
      document.getElementById('spotX').textContent = data.spot_x.toFixed(1);
      if (data.smoothed_x != null) {
        document.getElementById('smoothX').textContent = data.smoothed_x.toFixed(1);
      }
      document.getElementById('spotY').textContent = data.spot_y.toFixed(1);
      document.getElementById('targetX').value = data.target_x != null ? data.target_x.toFixed(1) : '';
      document.getElementById('errorVal').textContent = data.error.toFixed(2);

      let errPct = Math.min(100, Math.abs(data.error) * 5);
      document.getElementById('errorBar').style.width = errPct + '%';
      document.getElementById('errorBar').style.background =
        errPct < 20 ? '#22c55e' : errPct < 60 ? '#f59e0b' : '#ef4444';

      if (data.stabilizing !== isStabilizing) {
        isStabilizing = data.stabilizing;
        document.getElementById('stabStatus').textContent = isStabilizing ? '稳高: 运行中' : '稳高: 未启动';
        document.getElementById('btnStartStab').style.display = isStabilizing ? 'none' : '';
        document.getElementById('btnStopStab').style.display = isStabilizing ? '' : 'none';
      }

      if (data.exposure != null) {
        document.getElementById('curExposure').textContent = data.exposure.toFixed(0) + ' μs';
      }
      if (data.gain != null) {
        document.getElementById('curGain').textContent = data.gain.toFixed(2) + ' dB';
      }

      if (data.position != null) {
        document.getElementById('stagePos').textContent = data.position;
      }

      const now = performance.now();
      if (lastFrameTime > 0) {
        frameCount++;
        if (now - lastFrameTime >= 1000) {
          fps = Math.round(frameCount / ((now - lastFrameTime) / 1000));
          document.getElementById('fpsVal').textContent = fps + ' FPS';
          frameCount = 0;
          lastFrameTime = now;
        }
      } else {
        lastFrameTime = now;
      }
    } else if (data.type === 'status') {
      if (data.calib_x != null) {
        document.getElementById('targetX').value = data.calib_x.toFixed(1);
      }
      if (data.smoothed_x != null) {
        document.getElementById('smoothX').textContent = data.smoothed_x.toFixed(1);
      }
      if (data.stabilizing !== undefined) {
        isStabilizing = data.stabilizing;
        document.getElementById('stabStatus').textContent = isStabilizing ? '稳高: 运行中' : '稳高: 未启动';
        document.getElementById('btnStartStab').style.display = isStabilizing ? 'none' : '';
        document.getElementById('btnStopStab').style.display = isStabilizing ? '' : 'none';
      }
      if (data.exposure != null) {
        document.getElementById('curExposure').textContent = data.exposure.toFixed(0) + ' μs';
        document.getElementById('exposureVal').value = data.exposure;
      }
      if (data.gain != null) {
        document.getElementById('curGain').textContent = data.gain.toFixed(2) + ' dB';
        document.getElementById('gainVal').value = data.gain;
      }
      if (data.position != null) {
        document.getElementById('stagePos').textContent = data.position;
      }
      if (data.kp != null) {
        document.getElementById('kpVal').value = data.kp;
      }
      if (data.deadzone != null) {
        document.getElementById('deadZone').value = data.deadzone;
      }
      if (data.window != null) {
        document.getElementById('windowVal').value = data.window;
      }
    } else if (data.type === 'error') {
      log('错误: ' + data.message);
    }
  };

  ws.onclose = () => {
    log('WebSocket 断开，3秒后重连...');
    document.getElementById('cameraImage').style.display = 'none';
    document.getElementById('noSignal').style.display = 'block';
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => log('WebSocket 错误');
}

function sendCmd(cmd) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(cmd));
  }
}

function log(msg) {
  const area = document.getElementById('logArea');
  area.textContent += new Date().toLocaleTimeString() + ' ' + msg + '\n';
  area.scrollTop = area.scrollHeight;
}

async function apiPost(path, body = {}) {
  const r = await fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return r.json();
}

async function enumCameras() {
  const r = await apiPost('/api/camera/enum');
  const sel = document.getElementById('cameraSelect');
  sel.innerHTML = '<option value="">-- 选择相机 --</option>';
  if (r.ret === 0 && r.count > 0) {
    r.devices.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      sel.appendChild(opt);
    });
    log('发现 ' + r.count + ' 个设备');
  } else {
    log('未发现相机设备');
  }
}

async function openCamera() {
  const sel = document.getElementById('cameraSelect');
  const selected = sel.value;
  if (!selected) {
    log('请先从下拉框选择要打开的相机');
    return;
  }
  const idx = parseInt(selected.match(/^\[(\d+)\]/)?.[1]);
  if (isNaN(idx)) {
    log('无法解析相机索引');
    return;
  }
  const r = await apiPost('/api/camera/open', { index: idx });
  if (r.ret === 0) {
    document.getElementById('camStatus').textContent = '已连接';
    document.getElementById('camDot').className = 'conn-dot online';
    isCameraConnected = true;
    log('相机已打开');
  }
}

async function closeCamera() {
  const r = await apiPost('/api/camera/close');
  document.getElementById('camStatus').textContent = '未连接';
  document.getElementById('camDot').className = 'conn-dot offline';
  document.getElementById('cameraImage').style.display = 'none';
  document.getElementById('noSignal').style.display = 'block';
  isCameraConnected = false;
}

async function connectStage() {
  const com = document.getElementById('comPort').value;
  const r = await apiPost('/api/stage/connect', { com: com, baud: 9600 });
  if (r.ret === 0) {
    document.getElementById('stageStatus').textContent = '已连接';
    document.getElementById('stageDot').className = 'conn-dot online';
    isStageConnected = true;
    log('位移台已连接 ' + com);
  } else {
    log('位移台连接失败: ' + (r.error || ''));
  }
}

async function disconnectStage() {
  const r = await apiPost('/api/stage/disconnect');
  document.getElementById('stageStatus').textContent = '未连接';
  document.getElementById('stageDot').className = 'conn-dot offline';
  isStageConnected = false;
}

function moveRel(dir) {
  if (!isStageConnected) return;
  const dist = parseFloat(document.getElementById('stepDistance').value);
  sendCmd({ type: 'move_rel', distance: dist * dir });
}

function stopStage() {
  if (!isStageConnected) return;
  sendCmd({ type: 'stop_stage' });
}

function calibrate() {
  sendCmd({ type: 'calibrate' });
}

function startStabilize() {
  const kp = parseFloat(document.getElementById('kpVal').value);
  const dz = parseFloat(document.getElementById('deadZone').value);
  const windowVal = parseInt(document.getElementById('windowVal').value);
  const targetVal = parseFloat(document.getElementById('targetX').value);
  sendCmd({ type: 'set_kp', value: kp });
  sendCmd({ type: 'set_deadzone', value: dz });
  sendCmd({ type: 'set_window', value: windowVal });
  if (!isNaN(targetVal)) {
    sendCmd({ type: 'start_stabilize', target_x: targetVal });
  } else {
    sendCmd({ type: 'start_stabilize' });
  }
}

function stopStabilize() {
  sendCmd({ type: 'stop_stabilize' });
}

function setExposure() {
  const val = parseFloat(document.getElementById('exposureVal').value);
  if (isNaN(val) || val <= 0) return;
  sendCmd({ type: 'set_exposure', value: val });
}

function setGain() {
  const val = parseFloat(document.getElementById('gainVal').value);
  if (isNaN(val) || val < 0) return;
  sendCmd({ type: 'set_gain', value: val });
}

function homeStage() {
  if (!isStageConnected) return;
  sendCmd({ type: 'home' });
}

connectWS();
</script>

</body>
</html>
